version: '3.8'

services:
  db:
    platform: linux/arm64
    image: kartoza/postgis:15-3.3
    container_name: morfi_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    platform: linux/arm64
    build: .
    container_name: morfi_app
    restart: always
    ports:
      - "5001:5000"
    environment:
      # URL generica
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    depends_on:
      - db

volumes:
  postgres_data: