<nav class="morfi-nav-auth">
  <div class="morfi-nav-inner">

    <!-- Logo -->
    <a href="{{ url_for('usuario.home') }}" class="morfi-brand">Morfi</a>

    <!-- Search -->
    <form action="{{ url_for('usuario.home') }}" method="get" class="morfi-search-container">
      <i class="bi bi-search morfi-search-icon"></i>
      <input type="text" name="q" placeholder="¿Qué querés comer hoy?" autocomplete="off">
    </form>

    <!-- Actions -->
    <div class="morfi-nav-actions">

      <!-- Bell -->
      <link rel="stylesheet" href="{{ url_for('static', filename='css/usuario/notifications.css') }}">
      <div class="morfi-bell-wrap">
        <button type="button" class="morfi-icon-btn" id="bell-btn" aria-label="Notificaciones"
                onclick="toggleNotifDropdown(event)">
          <i class="bi bi-bell"></i>
          <span class="morfi-notif-badge" id="notif-badge" style="display:none;">0</span>
        </button>

        <div class="notif-dropdown" id="notif-dropdown">
          <div class="notif-dd-header">
            <div>
              <div class="notif-dd-title">Notificaciones</div>
              <div class="notif-dd-sub" id="notif-dd-sub">Cargando...</div>
            </div>
            <button class="notif-dd-mark" onclick="markAllRead()">Marcar leídas</button>
          </div>
          <div class="notif-dd-list" id="notif-dd-list"></div>
          <div class="notif-dd-footer">
            <a href="{{ url_for('usuario.notifications_page') }}">Ver todas las notificaciones</a>
          </div>
        </div>
      </div>

      <script>
        var NOTIF_CSRF = '{{ csrf_token() }}';

        const TIPO_ICON = {
          review:    {icon:'bi-star',           bg:'#FFF0EB', color:'#FF6B35'},
          reserva:   {icon:'bi-calendar-check', bg:'#E8F6F1', color:'#0B7A56'},
          respuesta: {icon:'bi-chat-left-text', bg:'#EEF0FF', color:'#5B5BD6'},
          amistad:   {icon:'bi-person-plus',    bg:'#F0F0F5', color:'#6B6B8A'},
          beneficio: {icon:'bi-gift',           bg:'#FFF0EB', color:'#FF6B35'},
        };

        async function loadNotifications() {
          try {
            var res = await fetch('/notificaciones/dropdown');
            var data = await res.json();

            var badge = document.getElementById('notif-badge');
            if (data.unread > 0) {
              badge.textContent = data.unread > 9 ? '9+' : data.unread;
              badge.style.display = 'flex';
            } else {
              badge.style.display = 'none';
            }

            var sub = document.getElementById('notif-dd-sub');
            sub.textContent = data.unread > 0 ? data.unread + ' sin leer' : 'Todo leído';

            var list = document.getElementById('notif-dd-list');
            if (data.items.length === 0) {
              list.innerHTML = '<div style="padding:24px;text-align:center;color:#8C8593;font-size:.85rem;">Sin notificaciones</div>';
              return;
            }
            list.innerHTML = data.items.map(function(n) {
              var t = TIPO_ICON[n.tipo] || {icon:'bi-bell', bg:'#F0F0F5', color:'#6B6B8A'};
              return '<a href="' + n.url + '" class="notif-dd-item' + (n.leida ? '' : ' notif-dd-item--unread') + '">' +
                '<div class="notif-dd-icon" style="background:' + t.bg + ';color:' + t.color + '"><i class="bi ' + t.icon + '"></i></div>' +
                '<div class="notif-dd-body">' +
                  '<div class="notif-dd-titulo">' + n.titulo + '</div>' +
                  (n.descripcion ? '<div class="notif-dd-desc">' + n.descripcion + '</div>' : '') +
                  '<div class="notif-dd-time">' + n.time_ago + '</div>' +
                '</div>' +
                (n.leida ? '' : '<div class="notif-dd-dot"></div>') +
              '</a>';
            }).join('');
          } catch(e) {}
        }

        function toggleNotifDropdown(e) {
          e.stopPropagation();
          var dd = document.getElementById('notif-dropdown');
          dd.classList.toggle('open');
          if (dd.classList.contains('open')) loadNotifications();
        }

        async function markAllRead() {
          await fetch('/notificaciones/marcar-leidas', {
            method: 'POST',
            headers: {'Content-Type':'application/x-www-form-urlencoded'},
            body: 'csrf_token=' + encodeURIComponent(NOTIF_CSRF),
          });
          loadNotifications();
        }

        document.addEventListener('click', function(e) {
          var dd = document.getElementById('notif-dropdown');
          if (dd && !dd.contains(e.target) && e.target.id !== 'bell-btn') {
            dd.classList.remove('open');
          }
        });

        // Cargar badge al entrar
        loadNotifications();
      </script>

      <!-- User dropdown -->
      <div class="dropdown">
        <button class="morfi-user-trigger" type="button"
                data-bs-toggle="dropdown" data-bs-offset="0,8"
                aria-expanded="false">
          <div class="morfi-avatar">
            {% if current_user.foto_perfil %}
              <img src="{{ url_for('static', filename=current_user.foto_perfil) }}"
                   alt="Perfil" class="morfi-avatar-image">
            {% elif current_user.avatar_url %}
              <img src="{{ current_user.avatar_url }}"
                   alt="Perfil" class="morfi-avatar-image" referrerpolicy="no-referrer">
            {% else %}
              {{ (current_user.name or 'Tu usuario')[:2]|upper }}
            {% endif %}
          </div>
          {% if current_user.nivel %}
            <span class="morfi-user-chip">Nivel {{ current_user.nivel }}</span>
          {% endif %}
          <i class="bi bi-chevron-down morfi-nav-chevron"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-end morfi-dropdown-panel">
          <!-- User info -->
          <li class="morfi-dd-header">
            <div class="morfi-dd-name">{{ current_user.name }}</div>
            <div class="morfi-dd-username">@{{ current_user.username }}</div>
          </li>
          <li><hr class="dropdown-divider my-1"></li>

          <!-- Links -->
          <li>
            <a class="morfi-dd-item" href="{{ url_for('usuario.profile') }}">
              <i class="bi bi-person"></i> Mi perfil
            </a>
          </li>
          <li>
            <a class="morfi-dd-item" href="{{ url_for('usuario.friends') }}">
              <i class="bi bi-people"></i> Amigos
            </a>
          </li>
          <li>
            <a class="morfi-dd-item" href="{{ url_for('usuario.discover_friends') }}">
              <i class="bi bi-person-plus"></i> Encontrá amigos
            </a>
          </li>
          <li>
            <a class="morfi-dd-item" href="{{ url_for('usuario.wishlist') }}">
              <i class="bi bi-heart"></i> Wishlist
            </a>
          </li>
          <li>
            <a class="morfi-dd-item" href="{{ url_for('usuario.ofertas') }}">
              <i class="bi bi-tags"></i> Ofertas y beneficios
            </a>
          </li>
          <li>
            <a class="morfi-dd-item" href="{{ url_for('usuario.history') }}">
              <i class="bi bi-clock-history"></i> Historial
            </a>
          </li>
          <li>
            <a class="morfi-dd-item" href="{{ url_for('usuario.security') }}">
              <i class="bi bi-shield"></i> Cuenta y seguridad
            </a>
          </li>
          <li><hr class="dropdown-divider my-1"></li>
          <li>
            <a class="morfi-dd-item morfi-dd-logout" href="{{ url_for('auth.logout') }}">
              <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </a>
          </li>
        </ul>
      </div>

    </div>
  </div>
</nav>

<style>
  /* ── Solo CSS nuevo (dropdown) — base.css maneja el resto ── */

  .morfi-user-trigger {
    background: none;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 4px 6px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .morfi-user-trigger:hover { background: var(--morfi-beige); }
  .morfi-user-trigger[aria-expanded="true"] .morfi-nav-chevron {
    transform: rotate(180deg);
  }

  .morfi-nav-chevron {
    font-size: 0.8rem;
    color: var(--morfi-muted);
    transition: transform 0.2s;
  }

  .morfi-dropdown-panel {
    width: 260px;
    border-radius: 14px !important;
    border: 1px solid var(--morfi-border) !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important;
    padding: 8px 0 !important;
  }

  .morfi-dd-header {
    padding: 12px 16px 10px;
  }
  .morfi-dd-name {
    font-weight: 700;
    font-size: 0.92rem;
    color: var(--morfi-dark);
  }
  .morfi-dd-username {
    font-size: 0.78rem;
    color: var(--morfi-muted);
    margin-top: 2px;
  }

  .morfi-dd-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    color: var(--morfi-dark);
    font-size: 0.88rem;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .morfi-dd-item:hover {
    background: #FFF7F4;
    color: var(--morfi-orange);
  }
  .morfi-dd-item i {
    width: 16px;
    text-align: center;
    font-size: 0.95rem;
  }

  .morfi-dd-logout { color: #dc3545; }
  .morfi-dd-logout:hover { background: #fff5f5; color: #b02a37; }
</style>
