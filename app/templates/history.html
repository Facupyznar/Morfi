{% extends 'base.html' %}
{% block title %}Historial de Consumo - Morfi{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="baloo text-dark mb-0">Historial de Consumo</h1>
        <input type="month" class="form-control w-auto border-morfi" value="2026-03">
    </div>

    <ul class="nav nav-tabs border-0 mb-4 gap-4" id="historyTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active border-0 border-bottom border-3 border-transparent px-0 pb-2 fw-bold text-muted" data-bs-toggle="tab" data-bs-target="#reservas">Reservas</button>
        </li>
        <li class="nav-item">
            <button class="nav-link border-0 border-bottom border-3 border-transparent px-0 pb-2 fw-bold text-muted" data-bs-toggle="tab" data-bs-target="#beneficios">Beneficios canjeados</button>
        </li>
    </ul>

    <div class="tab-content" id="historyTabsContent">
        <div class="tab-pane fade show active" id="reservas">
            <div class="d-flex flex-column gap-3">
                {% for res in [1, 2, 3] %}
                <div class="card-morfi p-3 d-flex align-items-center gap-3">
                    <div class="bg-secondary-subtle rounded-3" style="width: 64px; height: 64px; flex-shrink: 0;"></div>
                    <div class="flex-grow-1">
                        <h6 class="mb-0 fw-bold">Don Julio</h6>
                        <small class="text-muted">28 mar 2026 · 4 comensales</small>
                    </div>
                    <span class="badge rounded-pill p-2 px-3" style="background-color: #C8F5E2; color: #0B7A56;">Asistió</span>
                    <a href="#" class="text-orange text-decoration-none small fw-bold" style="color: var(--morfi-orange)">Ver reseña</a>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="tab-pane fade" id="beneficios">
            <div class="d-flex flex-column gap-3">
                <div class="card-morfi p-3 d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-0 fw-bold">Postre gratis</h6>
                        <small class="text-muted">Lo de Carlitos · 28 mar 2026</small>
                    </div>
                    <span class="badge rounded-pill p-2 px-3" style="background-color: #FFF0EB; color: #C94A1A;">Nivel 3</span>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
#historyTabs .nav-link.active { color: var(--morfi-orange) !important; border-bottom-color: var(--morfi-orange) !important; background: none; }
#historyTabs .nav-link:hover:not(.active) { color: var(--morfi-dark) !important; }
</style>
{% endblock %}
