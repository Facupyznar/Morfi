{% extends 'base.html' %}

{% block customCSS %}
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
{% endblock %}

{% block content %}
<div class="split-container-fixed">
    
    <div class="brand-panel-user d-none d-lg-flex">
        <div class="text-center">
            <h1 class="logo-morf-orange">Morfi</h1>
            <p class="tagline-gray">Tu próxima experiencia gastronómica te espera</p>
        </div>
    </div>

    <div class="form-panel">
        <div class="form-content-box">
            <h2 class="form-main-title">Crear cuenta</h2>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <input type="text" name="name" class="morfi-custom-input" placeholder="Nombre completo" required>
                <input type="text" name="username" class="morfi-custom-input" placeholder="Nombre de usuario" required>
                <input type="email" name="email" class="morfi-custom-input" placeholder="Email" required>
                
                <div class="mb-1">
                    <input type="date" name="fecha" id="fecha" class="morfi-custom-input" required>
                    <label for="fecha" class="input-sublabel">Fecha de Nacimiento</label>
                </div>

                <div class="position-relative mb-2">
                    <input type="password" name="password" class="morfi-custom-input" placeholder="Contraseña" required>
                    <i class="bi bi-eye position-absolute end-0 top-50 translate-middle-y me-3 text-muted" style="cursor: pointer; margin-top: -6px;"></i>
                </div>

                <input type="password" name="confirm_password" class="morfi-custom-input" placeholder="Confirmar contraseña" required>

                <button type="submit" class="btn-morfi-primary-full">Crear cuenta</button>

                <div class="text-center mt-3">
                    <p class="switch-auth-text mb-1" style="font-size: 0.85rem;">
                        Ya tengo cuenta — <a href="{{ url_for('auth.login') }}">Iniciar sesión</a>
                    </p>
                    <p class="switch-auth-text" style="font-size: 0.85rem;">
                        <a href="{{ url_for('auth.register_selection') }}">Elegir otro tipo de cuenta</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
