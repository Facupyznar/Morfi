{% extends 'base.html' %}

{% block title %}Login - Morfi{% endblock %}

{% block customCSS %}
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <form class="form-signin mx-auto shadow-sm p-4 rounded bg-white" style="max-width: 400px; width: 100%;" action="{{ url_for('auth.login') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="text-center mb-3">
            <img src="{{ url_for('static', filename='MORFI.png') }}" alt="Morfi Logo" width="80">
            <p class="small" style="color: #F2673B; font-weight: 500;">No pierdas tiempo, Comé bien.</p>
        </div>

        <h1 class="h4 mb-3 fw-bold text-center">Iniciar Sesión</h1>

        <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus>
            <label for="username">Usuario</label>
        </div>

        <div class="form-floating mb-4">
            <input type="password" class="form-control" name="password" placeholder="Password" required>
            <label for="password">Contraseña</label>
        </div>

        <button class="w-100 btn btn-lg btn-primary" type="submit" style="background-color: #F2673B; border: none;">Ingresar</button>

        <div class="mt-3 text-center">
            <hr>
            <a href="{{ url_for('auth.register') }}" class="text-decoration-none" style="color: #F2673B;">¿No tenés cuenta? Registrate</a>
        </div>
    </form>
</div>
{% endblock %}
